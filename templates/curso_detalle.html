{% extends "index.html" %}
{% block title %}{{ curso.titulo }} — DiartexAcademy{% endblock %}

{% block extra_scripts %}
{{ block.super }}
<script>
// Precarga datos del curso desde Django para que la SPA los tenga inmediatamente
// sin tener que esperar la llamada a la API
window.CURSO_PRELOAD = {
  id: {{ curso.id }},
  slug: "{{ curso.slug }}",
  title: "{{ curso.titulo|escapejs }}",
  desc: "{{ curso.descripcion_corta|escapejs }}",
  emoji: "{{ curso.emoji|escapejs }}",
  cat: "{% if curso.categoria %}{{ curso.categoria.key }}{% endif %}",
  bannerUrl: "{{ curso.imagen_banner }}",
  cardImageUrl: "{{ curso.imagen_card }}",
  buyUrl: "{{ curso.buy_url }}",
  buyText: "{{ curso.buy_text|escapejs }}",
  whatsapp: "{{ curso.whatsapp }}",
  hidden: {{ curso.oculto|yesno:"true,false" }},
  featured: {{ curso.destacado|yesno:"true,false" }},
  masvendido: {{ curso.mas_vendido|yesno:"true,false" }},
  specialCats: [],
  blocks: []
};

// Interceptar init() para inyectar el curso preloaded y abrirlo automáticamente
(function() {
  const _origInit = window.init;
  window.init = async function() {
    // Pre-inyectar para acceso inmediato
    if (!window.courses) window.courses = [];
    if (!window.courses.find(c => c.slug === window.CURSO_PRELOAD.slug)) {
      window.courses.push(window.CURSO_PRELOAD);
    }
    await _origInit.call(this);
    // Limpiar duplicados que la API pudo haber creado
    let found = false;
    window.courses = window.courses.filter(c => {
      if (c.slug !== window.CURSO_PRELOAD.slug) return true;
      if (!found) { found = true; return true; }
      return false;
    });
    // Mostrar el curso directamente
    const curso = window.courses.find(
      c => c.id === window.CURSO_PRELOAD.id || c.slug === window.CURSO_PRELOAD.slug
    );
    if (curso && typeof showCourseDetail === 'function') {
      showCourseDetail(curso.id);
    }
  };
})();
</script>
{% endblock %}
